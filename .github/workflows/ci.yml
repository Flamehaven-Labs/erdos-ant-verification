name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Pytest
        run: pytest -q --cov=src/erdos_ant --cov-report=xml
      - name: Upload coverage (Ubuntu / 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  verify:
    name: scripts/verify.py
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run verification (default frozen-report mode; exit code = verdict)
        run: python -m erdos_ant.verify
      - name: Re-run with --write-evidence and confirm tracked evidence is unchanged
        run: |
          python -m erdos_ant.verify --write-evidence
          # If the freshly written evidence differs from the tracked version
          # by more than the timestamp line, the release-evidence is stale
          # and needs to be re-committed.
          git diff --unified=0 reports/verification_result.json | grep -vE '^(\+\+\+|---|@@|\+\s*"generated_at_utc"|-\s*"generated_at_utc")' > /tmp/diff.txt || true
          if [ -s /tmp/diff.txt ]; then
            echo "ERROR: tracked reports/verification_result.json is stale (non-timestamp diff):"
            cat /tmp/diff.txt
            exit 1
          fi
          echo "Tracked evidence is fresh (only timestamp differs)."
      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: reports/verification_*.{json,md}

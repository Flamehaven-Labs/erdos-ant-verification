name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Pytest
        run: pytest -q --cov=src/erdos_ant --cov-report=xml
      - name: Upload coverage (Ubuntu / 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  verify:
    name: scripts/verify.py
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run verification script
        run: python scripts/verify.py
      - name: Confirm verdict is PASS
        run: |
          python -c "import json,sys; d=json.load(open('reports/verification_result.json')); sys.exit(0 if d['verdict']=='PASS' else 1)"
      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: reports/
